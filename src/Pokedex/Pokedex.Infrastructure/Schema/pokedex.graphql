
type PokemonResult {
    number: Int!
    name: String
    type1: String
    type2: String
    total: Int
    hp: Int
    attack: Int
    defense: Int
    spAttack: Int
    spDefense: Int
    speed: Int
    generation: Int
    legendary: Boolean
}

type PokemonData {
    data: [PokemonResult!]!
}
type Query {
    PokemonGeneric: PokemonData!
}